services:
  # ======================================================
  # 1. 数据库与基础组件
  # ======================================================
  mysql:
    image: mysql:8.0
    container_name: mysql8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: workflow
    ports:
      - "23306:3306"
    volumes:
      - /Users/xiz/docker-volumes/mysql_data:/var/lib/mysql
    networks:
      - project-net

  mongodb:
    image: mongo:6.0
    container_name: mongo6
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "37018:27017"
    volumes:
      - /Users/xiz/docker-volumes/mongo_data:/data/db
    networks:
      - project-net

  postgres:
    image: postgres:15-alpine
    container_name: dify-postgres
    restart: always
    environment:
      POSTGRES_USER: dify
      POSTGRES_PASSWORD: dify
      POSTGRES_DB: dify
    volumes:
      - /Volumes/Data24T/docker-volumes/dify_postgres:/var/lib/postgresql/data
    networks:
      - project-net

  redis:
    image: redis:7-alpine
    container_name: dify-redis
    restart: always
    networks:
      - project-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: dify-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - project-net

  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: qdrant
    restart: always
    volumes:
      - /Volumes/Data24T/docker-volumes/qdrant_data:/qdrant/storage
    networks:
      - project-net

  # ======================================================
  # 2. Keycloak 身份认证
  # ======================================================
  keycloak:
    image: xiz001/quant_keycloak:d471046
    container_name: quant_keycloak
    restart: always
    ports:
      - "18082:8080"
    environment:
      - KC_DB=mysql
      - KC_DB_URL=jdbc:mysql://mysql8:3306/keycloak?useSSL=false&allowPublicKeyRetrieval=true
      - KC_DB_USERNAME=root
      - KC_DB_PASSWORD=root
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ../quant_keycloak/quant-realm.json:/opt/keycloak/data/import/quant-realm.json:ro
    depends_on:
      - mysql
    networks:
      - project-net

  # ======================================================
  # 3. Quant 平台
  # ======================================================
  quant_api:
    image: xiz001/quant_api:608604f
    container_name: quant_api
    restart: always
    ports:
      - "18081:8081"
    depends_on:
      - mysql
      - mongodb
      - keycloak
    networks:
      - project-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  quant_ui:
    image: xiz001/quant_ui:8f7df4a
    container_name: quant_ui
    restart: always
    ports:
      - "18080:80"
    depends_on:
      - quant_api
    networks:
      - project-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  quant_data:
    image: xiz001/quant_data:6f87efb
    container_name: quant_data
    restart: always
    environment:
      - OLLAMA_MODEL=qwen3:4b-q4_K_M
      - OLLAMA_API=http://host.docker.internal:11434
    depends_on:
      - quant_api
    networks:
      - project-net
    volumes:
      - ./quant_data/scripts:/app/scripts
      - /Volumes/Data24T/docker-volumes/gdelt_cache:/Volumes/Data24T/docker-volumes/gdelt_cache
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  quant_scheduler:
    image: xiz001/quant_data:6f87efb
    container_name: quant_scheduler
    restart: always
    command: ["python", "scheduler/task.py"]
    environment:
      - SLM_PROVIDER=lmstudio
      - SLM_API_MODE=openai
      - SLM_API_URL=http://host.docker.internal:1234/v1
      - SLM_MODEL=qwen3.5-4b
      - SLM_MAX_CONCURRENCY=1
      - MONGO_URI=mongodb://root:root@mongo6:27017/quant_data?authSource=admin
      - LOCAL_MONGO_URI=mongodb://root:root@mongo6:27017/quant_data?authSource=admin
      - MYSQL_HOST=mysql8
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
      - MYSQL_DATABASE=workflow
      - USE_MYSQL_BATCH_QUEUE=true
      - RUN_STARTUP_INCREMENTAL_JOBS=true
      - RUN_STARTUP_PRICE_HISTORY_BACKFILL=true
      - RUN_STARTUP_GDELT_BACKFILL=true
      - RUN_STARTUP_FEATURE_BUILD=false
      - ENABLE_FINNHUB_JOB=true
      - FINNHUB_JOB_MINUTES=30
      - ENABLE_NEWSAPI_JOB=true
      - NEWSAPI_JOB_MINUTES=60
      - ENABLE_YAHOO_JOB=true
      - YAHOO_JOB_MINUTES=60
      - ENABLE_PRICE_HISTORY_BACKFILL_JOB=true
      - PRICE_HISTORY_BACKFILL_JOB_TIME=06:30
      - ENABLE_DAILY_GDELT_BACKFILL_JOB=true
      - DAILY_GDELT_BACKFILL_JOB_TIME=05:15
      - ENABLE_DAILY_PRICE_JOB=true
      - DAILY_PRICE_JOB_TIME=07:30
      - ENABLE_DAILY_FEATURE_JOB=true
      - DAILY_FEATURE_JOB_TIME=08:00
      - FEATURE_NEWS_COLLECTION=news_articles_company_matched_v1
      - FEATURE_OUTPUT_COLLECTION=daily_symbol_features_company_matched_v1
      - ENABLE_GDELT_BACKFILL_JOB=false
    depends_on:
      - mongodb
      - mysql
      - quant_api
    networks:
      - project-net
    volumes:
      - ../quant_data:/app
      - /Volumes/Data24T/docker-volumes/gdelt_cache:/Volumes/Data24T/docker-volumes/gdelt_cache
    healthcheck:
      test: ["CMD", "python", "-c", "print('scheduler-ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ======================================================
  # 4. Dify 平台
  # ======================================================
  sandbox:
    image: langgenius/dify-sandbox:0.2.10
    container_name: dify-sandbox
    restart: always
    networks:
      - project-net

  dify-api:
    image: langgenius/dify-api:0.15.3
    container_name: dify-api
    restart: always
    ports:
      - "15001:5001"
    environment: &dify_env
      MODE: api
      VERSION: 0.15.3
      DEBUG: "true"
      SECRET_KEY: "dify-secret-change-me"
      DB_USERNAME: dify
      DB_PASSWORD: dify
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      VECTOR_STORE: qdrant
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/storage
      CODE_EXECUTION_ENDPOINT: http://sandbox:8194
      CODE_EXECUTION_API_KEY: dify-sandbox
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      HTTP_ALLOW_CORS: "true"
      CORS_ALLOW_ORIGINS: "*"
      CONSOLE_CORS_ALLOW_ORIGINS: "*"
      WEB_API_CORS_ALLOW_ORIGINS: "*"
    volumes:
      - /Volumes/Data24T/docker-volumes/dify_storage:/app/storage
    depends_on:
      - postgres
      - redis
      - qdrant
      - sandbox
    networks:
      - project-net

  dify-worker:
    image: langgenius/dify-api:0.15.3
    container_name: dify-worker
    restart: always
    environment:
      <<: *dify_env
      MODE: worker
    volumes:
      - /Volumes/Data24T/docker-volumes/dify_storage:/app/storage
    depends_on:
      - dify-api
    networks:
      - project-net

  dify-web:
    image: langgenius/dify-web:0.15.3
    container_name: dify-web
    restart: always
    ports:
      - "18089:3000"
    environment:
      CONSOLE_API_URL: http://dify-api:5001
      APP_API_URL: http://dify-api:5001
    depends_on:
      - dify-api
    networks:
      - project-net

  # ======================================================
  # 5. MLflow 实验追踪
  # ======================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    container_name: mlflow
    restart: always
    ports:
      - "15050:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlruns.db
      --artifacts-destination /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - /Users/xiz/docker-volumes/mlflow_data:/mlflow
    networks:
      - project-net

  # ======================================================
  # 6. LangChain Agent
  # ======================================================
  langchain-agent:
    image: xiz001/langchain_agent:c25fca5
    container_name: langchain-agent
    restart: always
    ports:
      - "18000:8083"
    environment:
      - LOCAL_MODEL_NAME=qwen3:8b-q4_K_M
      - OPENAI_API_KEY=你的Key
      - QUANT_API=http://quant_api:8081
      - DIFY_API=http://dify-api:5001
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      - dify-api
      - quant_api
    networks:
      - project-net
# ======================================================
# 网络
# ======================================================
  # ======================================================
  # 7. Airflow 任务调度
  # ======================================================
  airflow-postgres:
    image: postgres:15-alpine
    container_name: airflow-postgres
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - /Users/xiz/docker-volumes/airflow_postgres:/var/lib/postgresql/data
    networks:
      - project-net

  airflow-init:
    image: apache/airflow:2.10.4
    container_name: airflow-init
    restart: "no"
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
      AIRFLOW__WEBSERVER__SECRET_KEY: quant_airflow_secret
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-docker==3.10.0"
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin
          --firstname Admin --lastname Admin --role Admin
          --email admin@quant.local || true
      "
    volumes:
      - ../quant_data/airflow/dags:/opt/airflow/dags
      - /Users/xiz/docker-volumes/airflow_logs:/opt/airflow/logs
    depends_on:
      - airflow-postgres
    networks:
      - project-net

  airflow-webserver:
    image: apache/airflow:2.10.4
    container_name: airflow-webserver
    restart: always
    environment: *airflow-env
    command: webserver
    ports:
      - "15060:8080"
    volumes:
      - ../quant_data/airflow/dags:/opt/airflow/dags
      - /Users/xiz/docker-volumes/airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - airflow-postgres
    networks:
      - project-net

  airflow-scheduler:
    image: apache/airflow:2.10.4
    container_name: airflow-scheduler
    restart: always
    environment: *airflow-env
    command: scheduler
    volumes:
      - ../quant_data/airflow/dags:/opt/airflow/dags
      - /Users/xiz/docker-volumes/airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - airflow-postgres
    networks:
      - project-net

networks:
  project-net:
    driver: bridge
